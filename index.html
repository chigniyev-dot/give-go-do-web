<!DOCTYPE html>
<html lang="ru">
<head>
    <style>
        /* Дополнительные стили для динамики */
        #projects-container { min-height: 400px; position: relative; }
        .loading-view { text-align: center; padding: 100px; color: var(--gold); font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 2px; }
        .pcard-img img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<section class="projects" id="projects">
    <div class="proj-header">
        <div>
            <div class="sec-eyebrow">Choose your mission / Выбери проект</div>
            <div class="sec-title">ВАШИ МИССИИ</div>
        </div>
    </div>

    <div class="cat-tabs">
        <button class="ctab active" onclick="filterProjects('africa', event)">🌍 Африка / Азия</button>
        <button class="ctab" onclick="filterProjects('cis', event)">🕌 СНГ / Балканы</button>
    </div>

    <div id="projects-container" class="proj-grid">
        <div class="loading-view">ПОИСК ДОСТУПНЫХ МИССИЙ...</div>
    </div>
</section>

<div class="overlay" id="modal-overlay">
    <div class="modal">
        <button class="modal-x" onclick="closeModal()">✕</button>
        <div class="modal-acc" id="modal-accent"></div>
        <div class="modal-hero"><img src="" id="modal-img"></div>
        <div class="modal-head">
            <div class="mcountry" id="modal-country"></div>
            <div class="mtitle" id="modal-title"></div>
        </div>
        <div class="mbody">
            <div class="msec">О миссии</div>
            <div class="mtext" id="modal-desc"></div>
            <div class="mprice-row">
                <div class="mpbox">
                    <div class="mplabel">Сбор проекта</div>
                    <div class="mpval" id="modal-goal"></div>
                </div>
                <div class="mpbox">
                    <div class="mplabel">Тур (чел)</div>
                    <div class="mpval" id="modal-price"></div>
                </div>
            </div>
            <a href="https://t.me/твой_ник" class="mcta">Забронировать в Telegram</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

<script>
    // Логика переключения вкладок
    function filterProjects(category, event) {
        document.querySelectorAll('.ctab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        window.currentCategory = category;
        renderProjects(window.allProjects);
    }
    
    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('on');
    }
</script>
</body>
</html>
